{% set name = "datalad" %}
{% set version = "1.4.1" %}
{% set sha256 = "9e7cecd589dd6058b84c3e93cc80af13b95aa0f938922ca6639f3d3509bc23d3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  entry_points:
    - datalad=datalad.cli.main:main
    - git-annex-remote-datalad-archives=datalad.customremotes.archives:main
    - git-annex-remote-datalad=datalad.customremotes.datalad:main
    - git-annex-remote-ria=datalad.customremotes.ria_remote:main
    - git-annex-remote-ora=datalad.distributed.ora_remote:main
    - git-credential-datalad=datalad.local.gitcredential_datalad:git_credential_datalad
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  # Do not even attempt until we get git-annex in there
  # py 3.10 is the minimal supported version
  skip: true  # [py<310]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
  host:
    - python
    - pip
    - setuptools >=59.0.0
    - wheel
    - packaging
    - fasteners
    - looseversion
    - typing-extensions >=4.0.0  # [py<311]
    - pypandoc

  run:
    - python
    # core
    - annexremote
    - chardet >=3.0.4
    - colorama  # [win]
    - distro
    - fasteners >=0.14
    - humanize
    - iso8601
    - looseversion
    - packaging
    - patool >=1.7
    - platformdirs
    - tqdm >=4.32.0
    - typing-extensions >=4.0.0  # [py<311]
    # downloaders
    - boto3
    - keyring >=20.0,!=23.9.0
    - keyrings.alt
    - msgpack-python
    - requests >=1.2
    # publish
    - python-gitlab
    # optional but included for a more complete experience
    - psutil
    - pyperclip  # [not (win and py>=39)]
    - python-dateutil
    - requests-ftp
    # non-python
    - git  # [not win]
    - git-annex  # [linux]
    - 7zip  # [win]
    - p7zip  # [not win]

test:
  imports:
    - datalad

  requires:
    - BeautifulSoup4
    - httpretty >=0.9.4
    - pytest >=7.0
    - pytest-fail-slow >=0.2
    - pytest-retry
    - packaging
    - vcrpy

  source_files:
    - tox.ini

about:
  home: http://datalad.org
  license: MIT
  license_file: COPYING
  summary: data distribution geared toward scientific datasets
  description: |
    DataLad aims to make data management and data distribution more accessible.
    To do that it stands on the shoulders of Git and Git-annex to deliver a
    decentralized system for data exchange. This includes automated ingestion of
    data from online portals, and exposing it in readily usable form as Git(-annex)
    repositories, so-called datasets. The actual data storage and permission
    management, however, remains with the original data providers.
  doc_url: http://datalad.readthedocs.io/
  dev_url: https://github.com/datalad/datalad

extra:
  recipe-maintainers:
    - yarikoptic
    - notestaff
    - mih
